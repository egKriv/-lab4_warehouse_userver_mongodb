User:
  type: object
  required: [id, login, first_name, last_name, email, created_at]
  properties:
    id:
      type: string
      format: uuid
    login:
      type: string
      minLength: 3
      maxLength: 50
    first_name:
      type: string
    last_name:
      type: string
    email:
      type: string
      format: email
    role:
      type: string
      enum: [storekeeper, manager, admin]
    created_at:
      type: string
      format: date-time
CreateUserRequest:
  type: object
  required: [login, password, first_name, last_name, email]
  properties:
    login:
      type: string
      minLength: 3
      maxLength: 50
    password:
      type: string
      minLength: 6
    first_name:
      type: string
    last_name:
      type: string
    email:
      type: string
      format: email
    role:
      type: string
      default: storekeeper
UserListResponse:
  type: object
  properties:
    items:
      type: array
      items:
        $ref: '#/User'
    total:
      type: integer