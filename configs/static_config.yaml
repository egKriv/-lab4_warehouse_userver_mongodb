components_manager:
  task_processors:
    main-task-processor:
      worker_threads: $worker-threads
    fs-task-processor:
      worker_threads: $worker-fs-threads

  default_task_processor: main-task-processor

  components:
    server:
      listener:
        port: $server-port
        task_processor: main-task-processor

    logging:
      fs-task-processor: fs-task-processor
      loggers:
        default:
          file_path: '@stderr'
          level: $logger-level
          overflow_behavior: discard

    testsuite-support: {}

    congestion-control:

    http-client:
    http-client-core:
      load-enabled: $is_testing
      fs-task-processor: fs-task-processor

    dns-client:
      fs-task-processor: fs-task-processor

    handler-ping:
      path: /ping
      method: GET
      task_processor: main-task-processor
      throttling_enabled: false
      url_trailing_slash: strict-match

    # Postgres
    postgres-db:
      dbconnection#env: POSTGRES_CONNECTION_STRING
      blocking_task_processor: fs-task-processor

    # MongoDB
    mongo-db:
      dbconnection: mongodb://mongo:27017/wms

    postgres-storage: {}

    # Auth
    HandlerLogin:
      path: /api/auth/login
      method: POST
      task_processor: main-task-processor

    jwt-auth-component:
      load-enabled: true
      private_key: $jwt_secret_key
      issuer: 'inventory-api'
      audience: 'inventory-api'

    # User
    HandlerCreateUser:
      path: /api/users
      method: POST
      task_processor: main-task-processor

    HandlerGetUserByLogin:
      path: /api/users/by-login/{login}
      method: GET
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    HandlerSearchUsers:
      path: /api/users/search
      method: GET
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    # Product
    HandlerAddProduct:
      path: /api/products
      method: POST
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    HandlerSearchProducts:
      path: /api/products/search
      method: GET
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    HandlerGetStock:
      path: /api/products/stock
      method: GET
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    # Receipt
    HandlerCreateReceipt:
      path: /api/receipts
      method: POST
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    HandlerGetReceipts:
      path: /api/receipts
      method: GET
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    # Write-off
    HandlerWriteOff:
      path: /api/inventory/write-off
      method: POST
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor

    # MongoDB writeoffs history
    HandlerGetWriteoffs:
      path: /api/writeoffs
      method: GET
      auth:
        types:
          - jwt-auth
      task_processor: main-task-processor